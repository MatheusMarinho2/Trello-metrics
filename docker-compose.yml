services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: trello-analytics
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-0}"
      DJANGO_DB_PATH: /data/db.sqlite3
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-2}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-300}"
    volumes:
      - trello_data:/data

  # Proxy HTTPS (Let's Encrypt). Subir com: docker compose --profile https up -d
  caddy:
    image: caddy:2-alpine
    container_name: trello-analytics-caddy
    restart: unless-stopped
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: "${APP_DOMAIN:-trello.intgest.com.br}"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  trello_data:
  caddy_data:
  caddy_config:
